name: CI

on:
  push:
    branches: [main, sprint/**]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — zero errors
        run: npx tsc --noEmit

      - name: ESLint — zero errors (warnings permitidos)
        run: npx eslint src/ --quiet
